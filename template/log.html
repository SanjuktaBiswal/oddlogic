<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>

html {
  height: 100%;
  width: 100%;
}

body {
  display: table;
  height: 100%;
  margin: 0;
  padding: 0;
  width: 100%;
}

.row1 {
  display: table-row;
  height: 20%;
}
.row2 {
  display: table-row;
  height: 80%;
}
.row:nth-child(1) {
  background-color: #eee;
}

.row:nth-child(2) {
  background-color: #ddd;
}
/* Split the screen in half */
.split {
  height: 100%;
  width: 100%;

  z-index: 1;
  top: 0;
  overflow-y: hidden;
  padding-top: 20px;
}
.container{
display:flex;
border:2px solid white;

flex-direction:column;
height:100%;
width:auto;

}
.fitemup{
background-color:#0099CC;
border:2px solid white;
margin:12px;
display:flex;
justify-content:center;
margin-bottom:2px;
height:20%;
}
.containervertical{
display:flex;
border:2px solid white;
flex-direction:row;
height:100%;
}

.topitem{
align-self:center;
}
.fitemside{
background-color:#EEEEEE;
border:2px solid white;
margin:5px 0 0 10px;
padding:5px;
margin-bottom:2px;
width:30%
}
form {
    display: block;
    margin-top: 0em;
    margin-block-end: 1em;
}
.fitemsection{
border:2px solid white;
margin:5px 0 0 10px;
padding:5px;
margin-bottom:2px;
width:70%
}
.fitemdown{
background-color:white;
border:2px solid white;
margin:2px;

height:80%;
}
.table{

    border-top-width: 0px;
    border-right-width: 0px;
    border-bottom-width: 0px;
    border-left-width: 0px;
    color: #FFFFFF; font-size: 20pt; font-weight: bold


}
select {
    width: 100%;
    height:130px;
    font-size: 8pt;
}

select:-internal-list-box {
    appearance: auto;
    align-items: flex-start;
    overflow-x: hidden;
    overflow-y: scroll;

    white-space: nowrap;
    border-radius: 2px;
}

div.scroll {


                background-color: white;
                width: 100%;
                height:130px;
                font-size: 8pt;
                overflow-x: hidden;
                overflow-y: auto;
                text-align:justify;
            }
</style>
<title>Log:Script</title>
</head>
<body>
<div class="container">
<div class="fitemup">
  <table class="topitem table">
    <tbody>
    <tr>
      <td id="logscript">Log: </td>
    </tr>
    </tbody>
  </table>

</div>


<div class="fitemdown">
  <div class="containervertical">
    <div class="fitemside">
      <form >
	<br><span style="color:darkred;"><b>Failures</b></span><br>
	<div id="failures"  class="scroll">

	</div>
</form>
      <form  >
	<br><span style="color:darkblue;"><b>Test Case Status</b></span><br>
	<div id="status" class="scroll">


	</div>
</form>

    </div>
    <div class="fitemsection">

<TABLE WIDTH="100%" border="1" rules="rows" summary="Log events" id="log">
<!--TR>
<TD></TD>
<TD CLASS="time" id="scripttime">Start Time:</TD>
<TD CLASS="note" id="scriptstart">Script start </TD>
</TR>
<TR><TD COLSPAN=3>
<ul id="scriptstatus">

</ul>
</TD></TR>
<TR>
<TD CLASS="pass">Pass</TD>
<TD CLASS="time" id="endtime">End Time:</TD>
<TD CLASS="note" id ='scriptend'>Script end </TD>
</TR>
<TR><TD COLSPAN=3><UL>
<LI ><I id="scriptname">script_name = </I></LI>

</UL>
</TD></TR-->


</TABLE>
    </div>

  </div>

</div>
</div>

</body>
</html>
